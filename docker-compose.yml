services:
  postgres:
    image: postgres:18
    container_name: fullstack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_password}
      POSTGRES_DB: mydb
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql

  task-server:
    build:
      context: ./task-server
    container_name: fullstack-task-server
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://admin:${POSTGRES_PASSWORD:-local_dev_password}@postgres:5432/mydb?schema=public
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-dev-refresh-secret}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./task-server/uploads:/app/uploads

  ts-demo:
    build:
      context: ./ts-demo
      args:
        VITE_API_BASE_URL: http://localhost:3000
    container_name: fullstack-ts-demo
    restart: unless-stopped
    depends_on:
      - task-server
    ports:
      - "5173:80"

volumes:
  postgres18_data:
